services:
  orchestrator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.orchestrator
    ports:
      - "8080:8080"
    environment:
      TELOS_PROVIDER: ${TELOS_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      TELOS_API_TOKEN: ${TELOS_API_TOKEN:-}
      TELOS_INTERNAL_TOKEN: ${TELOS_INTERNAL_TOKEN:-}
      TELOS_ALLOW_IMAGE_EGRESS: ${TELOS_ALLOW_IMAGE_EGRESS:-false}
      WINDOWS_MCP_HOST: host.docker.internal
      WINDOWS_MCP_PORT: 8083
      SCREENSHOT_ENGINE_HOST: host.docker.internal
      SCREENSHOT_ENGINE_PORT: 8085
      DELTA_ENGINE_HOST: host.docker.internal
      DELTA_ENGINE_PORT: 8084
    extra_hosts:
      - "host.docker.internal:host-gateway"

  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.scheduler
    ports:
      - "8081:8081"
    environment:
      TELOS_API_TOKEN: ${TELOS_API_TOKEN:-}
      ORCHESTRATOR_API_TOKEN: ${ORCHESTRATOR_API_TOKEN:-}
      ORCHESTRATOR_HOST: orchestrator
      ORCHESTRATOR_PORT: 8080
    depends_on:
      - orchestrator
