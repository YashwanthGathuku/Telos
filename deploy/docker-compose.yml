services:
  orchestrator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.orchestrator
    ports:
      - "8080:8080"
    environment:
      TELOS_PROVIDER: ${TELOS_PROVIDER:-azure_foundry}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      AZURE_FOUNDRY_ENDPOINT: ${AZURE_FOUNDRY_ENDPOINT:-}
      AZURE_FOUNDRY_API_KEY: ${AZURE_FOUNDRY_API_KEY:-}
      AZURE_FOUNDRY_MODEL: ${AZURE_FOUNDRY_MODEL:-gpt-4o}
      TELOS_API_TOKEN: ${TELOS_API_TOKEN:-}
      TELOS_INTERNAL_TOKEN: ${TELOS_INTERNAL_TOKEN:-}
      TELOS_ALLOW_IMAGE_EGRESS: ${TELOS_ALLOW_IMAGE_EGRESS:-false}
      WINDOWS_MCP_HOST: host.docker.internal
      WINDOWS_MCP_PORT: 8083
      CAPTURE_ENGINE_HOST: host.docker.internal
      CAPTURE_ENGINE_PORT: 8084
    extra_hosts:
      - "host.docker.internal:host-gateway"

  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.scheduler
    ports:
      - "8081:8081"
    environment:
      TELOS_API_TOKEN: ${TELOS_API_TOKEN:-}
      ORCHESTRATOR_API_TOKEN: ${ORCHESTRATOR_API_TOKEN:-}
      ORCHESTRATOR_HOST: orchestrator
      ORCHESTRATOR_PORT: 8080
    depends_on:
      - orchestrator
